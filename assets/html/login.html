<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="shortcut icon" href="../img/DTWICON.png" type="image/x-icon">
    
    <title>Dataware - Login</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container d-flex flex-column min-vh-100 justify-content-center align-items-center">

        <header class="text-center mb-2">
            <img class="logo-dtw" src="../img/DATAWARE2.png" alt="">
        </header>

        <main class="container-fluid p-4 d-flex justify-content-center align-items-center">
            <div class="card card-custom p-4" style="width: 400px;">
                <h3 class="text-center mb-4 fw-bold">Acesse sua conta</h3>
                <form>
                    <label for="basic-url" class="form-label fw-medium">Usuário ou e-mail</label>
                    <div class="input-group mb-3">
                        <span class="input-group-text icon-cadastro" id="basic-addon3"><i class="fa-regular fa-user"></i></span>
                        <input type="text" class="form-control" id="basic-url" aria-describedby="basic-addon3" placeholder="Digite seu usuário ou e-mail">
                    </div>
                    <label for="basic-url" class="form-label fw-medium">Senha</label>
                    <div class="input-group mb-3">
                        <span class="input-group-text icon-cadastro" id="basic-addon3"><i class="fas fa-lock"></i></span>
                        <input type="text" class="form-control" id="basic-url" aria-describedby="basic-addon3" placeholder="Insira sua senha">
                    </div>

                    <div class="forgotPass mb-3"><a href="#">Esqueceu sua senha?</a></div>

                    <button type="submit" class="btn btn-sign w-100 fw-bold">Entrar</button>
                </form>
            </div>
        </main>

        <footer>
            <div class="container text-muted text-center">
                <small>Fale conosco</small> | <small>Termos de uso</small> | <small>Política de privacidade</small>
                <br><small><a href="">dataware.com.br</a> - 2026 - © Todos os direitos reservados.</small>
            </div>
        </footer>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
